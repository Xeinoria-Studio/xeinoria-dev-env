services:
  minecraft:
    image: ghcr.io/xeinoria-studio/xeinoria-dev-env:latest
    # Pour build en local :  docker compose up --build
    build: .
    container_name: xeinoria-dev
    ports:
      - "25565:25565"
      - "24454:24454/udp"  # Simple Voice Chat
    volumes:
      # Vos scripts : créez des fichiers .sk dans ./scripts/ et rechargez avec /sk reload <nom>
      - ./scripts:/server/plugins/Skript/scripts
      # Plugins qui nécessitent un téléchargement manuel (SpigotMC) — voir plugins-extra/README.md
      - ./plugins-extra:/server/plugins-extra
    environment:
      JVM_XMX: "1G"
      JVM_XMS: "512M"
      # Nom du conteneur, exposé aux scripts via _xeinoria_env("XEINORIA_CONTAINER")
      # (utilisé par _xeinoria_welcome.sk pour afficher la commande docker attach)
      XEINORIA_CONTAINER: "xeinoria-dev"
      # SkRedis — laissez vide (REDIS_HOST="") pour désactiver complètement le plugin
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "password"
    depends_on:
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

  redis:
    image: redis:7-alpine
    container_name: xeinoria-dev-redis
    command: ["redis-server", "--requirepass", "password"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Port exposé uniquement si vous voulez vous connecter depuis l'hôte :
    # ports:
    #   - "6379:6379"
